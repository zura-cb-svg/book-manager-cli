{% extends "base.html" %}

{% block content %}

<h2>➕ Add Book</h2>

<form method="POST">
    <input name="title" placeholder="Title" class="form-control mb-2" required>
    <input name="author" placeholder="Author" class="form-control mb-2" required>
    <input name="year" placeholder="Year" class="form-control mb-2" required>

    <button class="btn btn-success w-100">Add</button>
</form>

{% endblock %}
