<!DOCTYPE html>
<html>
<head>
    <title>Test Form</title>
</head>
<body>

<h2>Enter your name</h2>

<form method="POST">
    <input type="text" name="name" placeholder="Your name">
    <button type="submit">Send</button>
</form>

</body>
</html>
<h3>Names:</h3>

<ul>
    {% for n in names %}
        <li>{{ n }}</li>
    {% endfor %}
</ul>
<ul>
    {% for n in names %}
        <li>
            {{ n }}
<a href="/edit_name?name={{ n }}">✏️</a>
            <a href="/remove_name?name={{ n }}">❌</a>
        </li>
    {% endfor %}
</ul>
{% if error %}
    <p>{{ error }}</p>
{% endif %}
